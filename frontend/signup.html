<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Signup - Bus Buddy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body{
    font-family: Arial, sans-serif;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-image: url('assets/image.jpg');
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
  }

  .signup-box{
    background: rgba(255, 255, 255, 0.0);
    width: 340px;
    box-shadow: none;
    border: 2px solid #000;
    border-radius: 10px;
    padding: 25px;
  }

  h2{
    text-align:center;
    color: #000;
  }

  input, select, button{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
    font-size: 14px;
    box-sizing: border-box;
  }

  input, select{
    background: rgba(255,255,255,0.8);
  }

  button{
    background:#2193b0;
    color:#fff;
    border:none;
    cursor:pointer;
    font-size: 15px;
  }

  button:hover{
    background:#1b7f98;
  }

  #msg{
    text-align:center;
    font-size:14px;
  }
</style>
</head>

<body>

<div class="signup-box">
  <h2>Student Signup Form</h2>

  <!-- Email auto-filled from login -->
  <input type="email" id="email" placeholder="Email" readonly>

  <input type="text" id="name" placeholder="Full Name" required>

  <input 
    type="text" 
    id="rollNo" 
    placeholder="Roll Number (6 or 7 digits)" 
    maxlength="7"
    required>

  <!-- DOB FIELD (CALENDAR ENABLED) -->
  <input 
    type="date" 
    id="dob" 
    required>

  <!-- COURSE DROPDOWN -->
  <select id="course" required>
    <option value="">Select Course</option>
    <option value="B.Tech">B.Tech (Bachelor of Technology)</option>
    <option value="BBA">BBA (Bachelor of Business Administration)</option>
    <option value="BAJMC">BAJMC (Journalism & Mass Communication)</option>
    <option value="BHM">BHM (Hotel Management)</option>
    <option value="BA">BA (Bachelor of Arts)</option>
  </select>

  <input 
    type="text" 
    id="phone" 
    placeholder="Phone Number (10 digits)" 
    maxlength="10"
    required>

  <button onclick="signup()">Complete Signup</button>

  <p id="msg"></p>
</div>

<script>
document.getElementById("email").value = localStorage.getItem("signupEmail");

async function signup() {

  const name = document.getElementById("name").value.trim();
  const rollNo = document.getElementById("rollNo").value.trim();
  const dob = document.getElementById("dob").value;
  const course = document.getElementById("course").value;
  const phone = document.getElementById("phone").value.trim();

  // Roll Number validation
  if (!/^\d{6,7}$/.test(rollNo)) {
    alert("Roll Number must be 6 or 7 digits only");
    return;
  }

  // DOB validation
  if (!dob) {
    alert("Please select Date of Birth");
    return;
  }

  // Course validation
  if (!course) {
    alert("Please select a course");
    return;
  }

  // Phone validation
  if (!/^\d{10}$/.test(phone)) {
    alert("Phone Number must be exactly 10 digits");
    return;
  }

  const data = {
    email: localStorage.getItem("signupEmail"),
    name,
    rollNo,
    dob,
    course,
    phone
  };

  console.log("SENDING 👉", data);

  try {
    const res = await fetch("http://localhost:5000/signup/student", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();
    console.log("RESPONSE 👉", result);

    if (result.success) {
      window.location.href = "student-dashboard.html";
    } else {node

      alert(result.message || "Signup failed");
    }
  } catch (error) {
    alert("Server error. Please try again later.");
    console.error(error);
  }
}
</script>

</body>
</html>
